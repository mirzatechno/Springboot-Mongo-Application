apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      application: springbootmongo
  template:
    metadata:
      labels:
        application: springbootmongo
    spec:
      containers:
      - name: spring-container
        image: mithuntechnologies/springboot-mongo-application:1
        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi

        # ✅ Use FULL URI (no confusion)
        env:
        - name: SPRING_DATA_MONGODB_URI
          value: mongodb://production:production123@mongo-service:27017/users?authSource=admin

        # ✅ Readiness Probe
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # ✅ Liveness Probe (FIXED INDENTATION)
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: springboot-service
  namespace: production
spec:
  type: ClusterIP
  selector:
    application: springbootmongo
  ports:
  - port: 80
    targetPort: 8080

---
# ❗ FIX: Use Deployment instead of ReplicaSet
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-deployment
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      application: mongo
  template:
    metadata:
      labels:
        application: mongo
    spec:
      containers:
      - name: mongo-container
        image: mongo
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: production
        - name: MONGO_INITDB_ROOT_PASSWORD
          value: production123

---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: production
spec:
  type: ClusterIP
  selector:
    application: mongo
  ports:
  - port: 27017
    targetPort: 27017
