apiVersion: v1
kind: ConfigMap
metadata:
  name: springappconfig
  namespace: development
data:            # We can define multiple key value pairs.
  mongodbusername: devb
  ---
apiVersion: v1
kind: Namespace
metadata:
  name: development
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: springboot-deployment
  namespace: development
spec:
  replicas: 2
  selector:
    matchLabels:
      application: springbootmongo
  strategy:
    type: RollingUpdate
  template:
    metadata:
      name: spring-pod
      labels:
        application: springbootmongo
    spec:
      containers:
      - name: spring-container
        image: mirzatechno/springboot-mongo-application:${Build_Number}
        ports:
        - containerPort: 8080
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 400m
            memory: 512Mi
        env:
        - name: MONGO_DB_HOSTNAME
          value: mongo-service #MongoDB Service Name
        - name: MONGO_DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: springappconfig
              key: mongodbusername
        - name: MONGO_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: springappsecret
              key: mongodbpassword
---
apiVersion: v1
kind: Service
metadata:
  name: springboot-service
  namespace: development
spec:
  type: NodePort
  selector:
    application: springbootmongo
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
   name: mongo-replicaset
   namespace: development
spec:
  replicas: 1
  selector:
    matchLabels:
      application: mongo
  template:
    metadata:
      name: mongo-pod
      labels:
        application: mongo
    spec:
      containers:
      - name: mongo-container
        image: mongo
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            configMapKeyRef:
              name: springappconfig
              key: mongodbusername
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: springappsecret
              key:  mongodbpassword
        volumeMounts:
          - name: mongodbhostvol
            mountPath: /data/db
        volumes:
          - name: mongodbhostvol
            hostPath:
              path: /tmp/mongo
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service #Service Name Should be Given for MONGO_DB_HOSTNAME
  namespace: development
spec:
  type: ClusterIP
  selector:
    application: mongo
  ports:
  - port: 27017
    targetPort: 27017
